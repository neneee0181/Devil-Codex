name: codex-version-check

# Stock Codex Desktop changes its rollout/session_meta format between releases.
# If Devil bundles an OLDER codex than the one writing the user's rollouts,
# thread/read fails and those threads desync. This job watches the latest STABLE
# codex release (prereleases/alphas excluded) and opens a PR bumping
# CODEX_VERSION when a newer one ships — a human still reviews/tests + merges,
# so a breaking codex app-server API change can't auto-ship.

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest stable codex tag
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh api repos/openai/codex/releases/latest --jq .tag_name)
          current=$(grep -oP 'CODEX_VERSION:\s*\K\S+' .github/workflows/release.yml)
          echo "latest=$latest"   >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "Latest stable codex: $latest | bundled: $current"

      - name: Open bump PR if newer
        if: steps.latest.outputs.latest != steps.latest.outputs.current
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST: ${{ steps.latest.outputs.latest }}
          CURRENT: ${{ steps.latest.outputs.current }}
        run: |
          branch="chore/codex-${LATEST}"
          if gh pr list --head "$branch" --state open --json number --jq 'length' | grep -q '^[1-9]'; then
            echo "PR for $branch already open; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          sed -i "s|CODEX_VERSION: .*|CODEX_VERSION: ${LATEST}|" .github/workflows/release.yml
          git add .github/workflows/release.yml
          git commit -m "chore(release): bump bundled codex to ${LATEST}"
          git push -u origin "$branch"
          {
            echo "Newer stable codex released. Bundling it keeps Devil able to read rollouts written by an updated stock Codex Desktop (an older binary fails thread/read with 'rollout does not start with session metadata')."
            echo ""
            echo "Before merging: smoke-test that the new codex app-server still speaks the JSON-RPC API Devil depends on (thread/start, turn/start, thread/read, approvals)."
            echo ""
            echo "Auto-generated by codex-version-check."
          } > "${RUNNER_TEMP}/pr-body.md"
          gh pr create --title "chore: bump bundled codex ${CURRENT} -> ${LATEST}" --body-file "${RUNNER_TEMP}/pr-body.md" --head "$branch"
