<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- dark squircle background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1320"/>
      <stop offset="0.55" stop-color="#100b16"/>
      <stop offset="1" stop-color="#07050a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#a8284f" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#a8284f" stop-opacity="0"/>
    </radialGradient>
    <!-- ember blob -->
    <linearGradient id="blob" x1="0.15" y1="0.1" x2="0.85" y2="0.95">
      <stop offset="0" stop-color="#ff5a7a"/>
      <stop offset="0.45" stop-color="#e0294f"/>
      <stop offset="1" stop-color="#8e1530"/>
    </linearGradient>
    <linearGradient id="blobHi" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb199"/>
      <stop offset="1" stop-color="#c8324a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#glow)"/>

  <!-- devil horns -->
  <g>
    <path d="M345 300 C 300 250 285 190 312 150 C 322 205 360 240 405 268 C 392 282 366 296 345 300 Z" fill="url(#horn)"/>
    <path d="M679 300 C 724 250 739 190 712 150 C 702 205 664 240 619 268 C 632 282 658 296 679 300 Z" fill="url(#horn)"/>
  </g>

  <!-- codex-style ember blob -->
  <path fill="url(#blob)" d="M512 286
    C 612 286 672 320 700 372
    C 792 384 836 452 820 530
    C 868 568 866 656 800 700
    C 786 776 712 812 628 800
    C 580 838 444 838 396 800
    C 312 812 238 776 224 700
    C 158 656 156 568 204 530
    C 188 452 232 384 324 372
    C 352 320 412 286 512 286 Z"/>
  <!-- top gloss -->
  <path fill="url(#blobHi)" opacity="0.9" d="M512 300
    C 600 300 656 330 686 378
    C 600 360 430 360 338 378
    C 368 330 424 300 512 300 Z"/>

  <!-- terminal prompt >_ -->
  <g stroke="#fff5f5" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M430 470 L 512 552 L 430 634"/>
    <path d="M566 636 L 660 636"/>
  </g>
</svg>
